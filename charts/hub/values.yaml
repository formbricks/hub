# Default values for hub.
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: formbricks/hub
  # If empty, Chart.appVersion is used
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

containerPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hub.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null
  behavior: {}

pdb:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

worker:
  # Hub async jobs (webhook dispatch, embeddings) run in hub-worker. Keep this
  # enabled unless another deployment processes the same River queues.
  enabled: true
  replicaCount: 1

  waitForApi:
    # Avoid starting workers before the API service is healthy during installs/upgrades.
    enabled: true

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}

  extraEnv: []
  extraEnvFrom: []

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Pods
            value: 1
            periodSeconds: 120
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Pods
            value: 2
            periodSeconds: 60

  # Disabled by default because the default worker replica count is 1.
  pdb:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  terminationGracePeriodSeconds: null

embeddings:
  # Optional self-hosted OpenAI-compatible embeddings runtime for Hub.
  enabled: false
  runtime: tei
  model: google/embeddinggemma-300m
  revision: ""
  # Defaults to `model` when empty. Used by TEI OpenAI-compatible responses
  # and as Hub's EMBEDDING_MODEL.
  servedModelName: ""
  # Defaults to http://<release>-hub-embeddings:<service.port>/v1 when empty.
  baseUrl: ""
  maxConcurrent: "5"
  normalize: "false"
  replicaCount: 1

  image:
    repository: "ghcr.io/huggingface/text-embeddings-inference"
    tag: "cpu-1.9"
    pullPolicy: IfNotPresent

  command: []
  # When empty, the chart renders TEI args from model, servedModelName, port,
  # revision, and persistence.mountPath. Set this to fully override args.
  args: []
  extraArgs: []
  env: {}

  port: 8080
  prometheusPort: 9000

  service:
    type: ClusterIP
    port: 8080
    annotations: {}
    additionalLabels: {}

  auth:
    # TEI can enforce bearer-token auth with API_KEY. Hub always receives the
    # same key as EMBEDDING_PROVIDER_API_KEY because the OpenAI-compatible Hub
    # provider requires an API key.
    enabled: true
    existingSecret: ""
    secretKey: EMBEDDING_PROVIDER_API_KEY
    apiKey: ""

  huggingFace:
    # Required for gated models such as google/embeddinggemma-300m unless the
    # model is pre-cached or a different ungated model is configured.
    existingSecret: ""
    tokenKey: HF_TOKEN
    token: ""

  persistence:
    enabled: true
    existingClaim: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    mountPath: /data

  resources:
    requests:
      cpu: "4"
      memory: 8Gi
    limits:
      memory: 8Gi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 600
        policies:
          - type: Pods
            value: 1
            periodSeconds: 300
      scaleUp:
        stabilizationWindowSeconds: 120
        policies:
          - type: Pods
            value: 1
            periodSeconds: 120

  # Disabled by default because the default embeddings replica count is 1.
  pdb:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1

  probes:
    startupProbe:
      failureThreshold: 60
      periodSeconds: 10
      tcpSocket:
        port: http
    readinessProbe:
      failureThreshold: 6
      periodSeconds: 10
      timeoutSeconds: 5
      tcpSocket:
        port: http
    livenessProbe:
      failureThreshold: 6
      periodSeconds: 20
      timeoutSeconds: 5
      tcpSocket:
        port: http

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  # Keep empty by default because upstream model-serving images may define
  # their own user and need write access to the model cache path.
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

networkPolicy:
  enabled: false
  ingressFrom: []
  egressTo: []

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

terminationGracePeriodSeconds: 30

probes:
  startup:
    enabled: true
    failureThreshold: 30
    periodSeconds: 5
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

config:
  create: true
  existingConfigMap: ""
  data:
    PORT: "8080"
    # Recommended for production when Hub is exposed through ingress, TLS termination,
    # or a reverse-proxy path prefix. Example: https://hub.example.com or
    # https://example.com/hub
    PUBLIC_BASE_URL: ""
    LOG_LEVEL: "info"
    SHUTDOWN_TIMEOUT_SECONDS: "30"
    MESSAGE_PUBLISHER_QUEUE_MAX_SIZE: "16384"
    MESSAGE_PUBLISHER_PER_EVENT_TIMEOUT_SECONDS: "10"
    WEBHOOK_DELIVERY_MAX_CONCURRENT: "100"
    WEBHOOK_DELIVERY_MAX_ATTEMPTS: "3"
    WEBHOOK_MAX_FAN_OUT_PER_EVENT: "500"
    WEBHOOK_MAX_COUNT: "500"
    WEBHOOK_HTTP_TIMEOUT_SECONDS: "15"
    WEBHOOK_BLACKLIST: "localhost,127.0.0.1,::1,169.254.169.254"
    WEBHOOK_ENQUEUE_MAX_RETRIES: "3"
    WEBHOOK_ENQUEUE_INITIAL_BACKOFF_MS: "100"
    WEBHOOK_ENQUEUE_MAX_BACKOFF_MS: "2000"
    DATABASE_MAX_CONNS: "25"
    DATABASE_MIN_CONNS: "0"
    DATABASE_MAX_CONN_LIFETIME_SECONDS: "3600"
    DATABASE_MAX_CONN_IDLE_TIME_SECONDS: "1800"
    DATABASE_HEALTH_CHECK_PERIOD_SECONDS: "60"
    DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
    # Optional: use with EMBEDDING_PROVIDER=openai to target a self-hosted OpenAI-compatible embeddings endpoint.
    # Example: http://text-embeddings-inference.default.svc.cluster.local/v1
    EMBEDDING_BASE_URL: ""

secrets:
  create: true
  existingSecret: ""
  annotations: {}
  stringData:
    # REQUIRED
    DATABASE_URL: ""
    # REQUIRED
    API_KEY: ""
    # Optional: required only when EMBEDDING_PROVIDER is openai or google (AI Studio)
    EMBEDDING_PROVIDER_API_KEY: ""
  externalSecrets:
    enabled: false
    # Name of existing SecretStore resource for AWS Secrets Manager
    secretStore: ""
    # AWS Secrets Manager secret name or ARN (JSON format expected)
    awsSecretName: ""
    # How often to sync from AWS Secrets Manager
    refreshInterval: 1h
    # Keys to extract from the JSON secret
    keys:
      - DATABASE_URL
      - API_KEY
      - EMBEDDING_PROVIDER_API_KEY

extraEnv: []
extraEnvFrom: []

migrations:
  enabled: true
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  hook:
    enabled: true
    deletePolicy: before-hook-creation,hook-succeeded
    weight: -5
  command:
    - sh
    - -c
  args:
    - goose -dir /app/migrations postgres "$DATABASE_URL" up && river migrate-up --database-url "$DATABASE_URL"

tests:
  enabled: true
