name: Migrations Validate

# Runs goose validate to ensure migration files are well-formed (no database required)

on:
  pull_request:
    paths:
      - 'migrations/**'
      - '.github/workflows/migrations-validate.yml'

concurrency:
  group: migrations-validate-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate migrations
    runs-on: ubuntu-24.04
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.27.1

      - name: Validate migrations
        run: make migrate-validate
