services:
  # PostgreSQL database with pgvector extension for Hub
  postgres:
    image: pgvector/pgvector:pg18
    container_name: formbricks_postgres
    environment:
      POSTGRES_USER: formbricks
      POSTGRES_PASSWORD: formbricks_dev
      POSTGRES_DB: hub_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U formbricks -d hub_dev']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - formbricks
    command: >
      postgres
      -c shared_preload_libraries=vector

  # Hub API service for local development
  hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formbricks_hub
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://formbricks:formbricks_dev@postgres:5432/hub_dev?sslmode=disable
      ENVIRONMENT: development
      LOG_LEVEL: debug
    networks:
      - formbricks
    volumes:
      - .:/app
    # Overwrite entrypoint to use air for hot reloading if desired, 
    # or just run the binary. For now we use the default from Dockerfile.

volumes:
  postgres_data:
    driver: local

networks:
  formbricks:
    driver: bridge
